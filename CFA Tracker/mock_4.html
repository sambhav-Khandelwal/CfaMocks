        /* Futuristic Perplexity-Style Enhanced Theme */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        /* Reset and base styles */
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            box-sizing: border-box;
        }

        /* Advanced CSS Variables for Consistent Theming */
        :root {
            /* Neon Colors */
            --neon-blue: #00d4ff;
            --neon-green: #00ff88;
            --neon-purple: #8b5cf6;
            --neon-orange: #ff6b35;
            --neon-pink: #ff007f;

            /* Background Gradients */
            --bg-primary: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --bg-elevated: #16213e;
            --bg-surface: #0f3460;
            --bg-card: linear-gradient(145deg, #1a1a2e, #16213e);
            --bg-glass: rgba(255, 255, 255, 0.02);

            /* Text Colors */
            --text-primary: #ffffff;
            --text-secondary: #b8c5d1;
            --text-muted: #64748b;
            --text-accent: var(--neon-blue);

            /* Border and Effects */
            --border-primary: #334155;
            --border-accent: var(--neon-blue);
            --border-success: var(--neon-green);
            --border-warning: var(--neon-orange);

            /* Shadows and Glows */
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 4px 8px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.5);

            --glow-blue: 0 0 20px rgba(0, 212, 255, 0.4);
            --glow-green: 0 0 20px rgba(0, 255, 136, 0.4);
            --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
            --glow-orange: 0 0 20px rgba(255, 107, 53, 0.4);

            /* Animation Curves */
            --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --ease-smooth: cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-sharp: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Enhanced Body and Layout */
        body {
            background: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Enhanced Main Container */
        .container, body > * {
            position: relative;
        }

        /* Ultra-Enhanced Home Button */
        .home-button {
            position: fixed !important;
            top: 20px !important;
            right: 20px !important;
            padding: 14px 28px !important;
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)) !important;
            color: white !important;
            border: 2px solid rgba(0, 212, 255, 0.3) !important;
            border-radius: 16px !important;
            cursor: pointer !important;
            text-decoration: none !important;
            font-weight: 700 !important;
            font-size: 14px !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            transition: all 0.4s var(--ease-bounce) !important;
            box-shadow: var(--glow-blue), var(--shadow-lg) !important;

            position: relative;
            overflow: hidden;

        .home-button::before {
            content: '';

            top: 0;

            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);

    <script>
        let sessions = JSON.parse(localStorage.getItem("sessions_mock_4")) || [];
        // PDF storage for sessions
        let sessionPdfStorage = {};
        let currentLoadedSession = -1;
        let answers = [];
        let pageNumbers = [];
        let flagged = [];
        let notes = [];  // Array to store notes for each question

        // Timer variables
        let startTime = Date.now();
        let timerInterval;

        // Render all saved sessions on page load
        renderSavedSessions();
        updateTotalAccuracy();
        startTimer();
// Force dark mode permanently
document.body.classList.add("dark-mode");
        // PDF handling functions
        
        // Convert file to base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function loadPDF() {
            const fileInput = document.getElementById('pdf-upload');
            const file = fileInput.files[0];
            
            if (file && file.type === 'application/pdf') {
                const fileURL = URL.createObjectURL(file);
                document.getElementById('pdf-frame').src = fileURL;
                document.getElementById('pdf-viewer').style.display = 'block';
            } else {
                alert('Please select a valid PDF file');
            }
        }

        function closePDF() {
            document.getElementById('pdf-viewer').style.display = 'none';
            document.getElementById('pdf-frame').src = '';
        }

        function loadQuiz(questionCount = null) {
            let totalQuestions = questionCount || document.getElementById("num-questions").value;
            document.getElementById("num-questions").value = totalQuestions;
            document.getElementById("total-questions").textContent = totalQuestions;
            const quizContainer = document.getElementById("quiz-container");
            const questionSidebar = document.getElementById("question-sidebar");
            
            quizContainer.innerHTML = "";
            questionSidebar.innerHTML = "";

            // Reset arrays when loading a new quiz
            answers = [];
            pageNumbers = new Array(parseInt(totalQuestions)).fill("");
            flagged = new Array(parseInt(totalQuestions)).fill(false);
            notes = new Array(parseInt(totalQuestions)).fill("");  // Initialize notes array

            // Create question blocks and sidebar items
            for (let i = 1; i <= totalQuestions; i++) {
                // Create main question block (without A, B, C options)
                let questionBlock = document.createElement("div");
                questionBlock.classList.add("question");
                questionBlock.innerHTML = `
                    <div class="question-text">Question ${i}:</div>
                    <textarea placeholder="Enter your notes or answer here..." rows="4" style="width: 100%; margin-top: 10px;" oninput="updateNote(${i}, this.value)"></textarea>
                    <div style="margin-top: 10px;">
                        <label for="page-${i}">Page Number: </label>
                        <input type="text" id="page-${i}" placeholder="Page #" style="width: 80px;" onchange="updatePageNumber(${i}, this.value)">
                    </div>
                `;
                quizContainer.appendChild(questionBlock);

                // Create sidebar item
                let sidebarItem = document.createElement("div");
                sidebarItem.classList.add("question-item");
                sidebarItem.innerHTML = `
                    <div class="question-number">${i}</div>
                    <div class="question-buttons">
                        <button class="right-btn" onclick="markAnswer(${i}, 'right')">✓</button>
                        <button class="wrong-btn" onclick="markAnswer(${i}, 'wrong')">✗</button>
                    </div>
                `;
                questionSidebar.appendChild(sidebarItem);
            }

            resetStats();
        }

                // Auto-save for loaded session
        function autoSaveLoadedSession() {
            if (currentLoadedSession >= 0 && sessions[currentLoadedSession]) {
                const session = sessions[currentLoadedSession];
                session.answers = [...answers];
                session.pageNumbers = [...pageNumbers];
                session.flagged = [...flagged];
                session.notes = [...notes];
                session.attempted = answers.filter(answer => answer !== undefined).length;
                session.rightCount = answers.filter(answer => answer === "right").length;
                session.percentage = session.attempted > 0 ? Math.round((session.rightCount / session.attempted) * 100) : 0;
                session.timeSpent = document.getElementById('timer').textContent;
                session.timestamp = new Date().toLocaleString();
                // Update PDF data for current session
                if (sessionPdfStorage[currentLoadedSession]) {
                    session.pdfData = sessionPdfStorage[currentLoadedSession];
                }
                localStorage.setItem("sessions_mock_4", JSON.stringify(sessions));
                updateTotalAccuracy();
            }
        }

        function markAnswer(questionNum, result) {
            answers[questionNum - 1] = result;
            updateStats();

            // Visual feedback with clearer colors
            const sidebarItem = document.querySelector(`.question-item:nth-child(${questionNum})`);
            sidebarItem.style.backgroundColor = result === 'right' ? '#28a745' : '#dc3545';
            sidebarItem.style.color = 'white';

            autoSaveLoadedSession();
        }

        function toggleFlag(questionNum) {
            flagged[questionNum - 1] = !flagged[questionNum - 1];
            const flagBtn = document.querySelector(`.question-item:nth-child(${questionNum}) .flag-btn`);

            if (flagged[questionNum - 1]) {
                flagBtn.classList.add('flagged');
                flagBtn.style.backgroundColor = '#ff8c00';
                autoSaveLoadedSession();
        } else {
                flagBtn.classList.remove('flagged');
                flagBtn.style.backgroundColor = '#6c757d';
            }
        }

        function updatePageNumber(questionNum, pageNum) {
            pageNumbers[questionNum - 1] = pageNum;
            autoSaveLoadedSession();  // Auto-save when page number is updated
        }

        function updateNote(questionNum, noteValue) {
            notes[questionNum - 1] = noteValue;
            autoSaveLoadedSession();  // Auto-save when note is updated
        }

                // Calculate and update total accuracy from all saved sessions
        function updateTotalAccuracy() {
            let totalAttempted = 0;
            let totalRight = 0;

            // Add up all saved sessions ONLY
            sessions.forEach(session => {
                if (session.attempted && session.rightCount) {
                    totalAttempted += session.attempted;
                    totalRight += session.rightCount;
                }
            });

            const totalAccuracy = totalAttempted > 0 ? Math.round((totalRight / totalAttempted) * 100) : 0;

            // Update the total accuracy bar
            document.getElementById("accuracy-progress").style.width = totalAccuracy + "%";
            document.getElementById("accuracy-percentage").textContent = totalAccuracy + "%";
        }

        function updateStats() {
            const attempted = answers.filter(answer => answer !== undefined).length;
            const rightCount = answers.filter(answer => answer === "right").length;
            const wrongCount = answers.filter(answer => answer === "wrong").length;
            const percentage = attempted > 0 ? Math.round((rightCount / attempted) * 100) : 0;

            document.getElementById("attempted").textContent = attempted;
            document.getElementById("right-count").textContent = rightCount;
            document.getElementById("wrong-count").textContent = wrongCount;
            document.getElementById("percentage").textContent = percentage + "%";

            // Update progress bars
            const totalQuestions = parseInt(document.getElementById("total-questions").textContent);
            const progressPercentage = (attempted / totalQuestions) * 100;
            document.getElementById("progress-bar-fill").style.width = progressPercentage + "%";
            
            // Update total accuracy bar (shows cumulative accuracy from all sessions)
            updateTotalAccuracy();
        }

        function resetStats() {
            document.getElementById("attempted").textContent = "0";
            document.getElementById("right-count").textContent = "0";
            document.getElementById("wrong-count").textContent = "0";
            document.getElementById("percentage").textContent = "0%";
            document.getElementById("progress-bar-fill").style.width = "0%";
            document.getElementById("accuracy-progress").style.width = "0%";
            document.getElementById("accuracy-percentage").textContent = "0%";
            
            // Reset timer
            startTime = Date.now();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const minutes = Math.floor(elapsed / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                document.getElementById("timer").textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

       function saveSession() {
    const sessionName = prompt("Enter session name:");
    if (!sessionName) return;

    const totalQuestions = parseInt(document.getElementById("total-questions").textContent);
    const attempted = answers.filter(answer => answer !== undefined).length;
    const rightCount = answers.filter(answer => answer === "right").length;
    const percentage = attempted > 0 ? Math.round((rightCount / attempted) * 100) : 0;

    const session = {
        name: sessionName,
        timestamp: new Date().toLocaleString(),
        totalQuestions: totalQuestions,
        answers: [...answers],
        pageNumbers: [...pageNumbers],
        flagged: [...flagged],
        attempted: attempted,
        rightCount: rightCount,
        percentage: percentage,
        timeSpent: document.getElementById("timer").textContent,
        notes: [...notes],
        pdfData: currentLoadedSession >= 0 && sessionPdfStorage[currentLoadedSession] ? sessionPdfStorage[currentLoadedSession] : null
    };

    sessions.push(session);
    localStorage.setItem("sessions_mock_4", JSON.stringify(sessions));
    
    // Set the newly saved session as loaded
    currentLoadedSession = sessions.length - 1;
    
    renderSavedSessions();
    alert("Session saved successfully!");
    updateTotalAccuracy();
}

       function loadSession(index) {
    const session = sessions[index];
    if (!session) return;

    // Set current loaded session
    currentLoadedSession = index;

    document.getElementById("num-questions").value = session.totalQuestions;
    loadQuiz(session.totalQuestions);
    
    answers = [...session.answers];
    pageNumbers = [...session.pageNumbers];
    flagged = [...session.flagged];
    notes = session.notes ? [...session.notes] : new Array(session.totalQuestions).fill("");

    // Restore page numbers
    session.pageNumbers.forEach((pageNum, i) => {
        if (pageNum) {
            const pageInput = document.getElementById(`page-${i + 1}`);
            if (pageInput) {
                pageInput.value = pageNum;
            }
        }
    });

    // Restore visual states
    answers.forEach((answer, i) => {
        if (answer) {
            const sidebarItem = document.querySelector(`.question-item:nth-child(${i + 1})`);
            if (sidebarItem) {
                sidebarItem.style.backgroundColor = answer === 'right' ? '#28a745' : '#dc3545';
                sidebarItem.style.color = 'white';
            }
        }
    });

    flagged.forEach((isFlagged, i) => {
        if (isFlagged) {
            const flagBtn = document.querySelector(`.question-item:nth-child(${i + 1}) .flag-btn`);
            if (flagBtn) {
                flagBtn.classList.add('flagged');
                flagBtn.style.backgroundColor = '#ff8c00';
            }
        }
    });

    updateStats();

    // Restore notes to textareas
    notes.forEach((note, i) => {
        if (note) {
            const textarea = document.querySelector(`.question:nth-child(${i + 1}) textarea`);
            if (textarea) {
                textarea.value = note;
            }
        }
    });

    // Highlight loaded session and update title
    document.getElementById('stats-title').textContent = `Score Stats: ${sessions[index].name}`;

    // Re-render sessions to update the visual loaded state
    renderSavedSessions();

    // Restore PDF for this session only
    if (session.pdfData) {
        document.getElementById('pdf-frame').src = session.pdfData.data;
        document.getElementById('pdf-viewer').style.display = 'block';
        sessionPdfStorage[index] = session.pdfData;
    } else {
        document.getElementById('pdf-viewer').style.display = 'none';
        document.getElementById('pdf-frame').src = '';
    }
}

        function deleteSession(index) {
            if (confirm("Are you sure you want to delete this session?")) {
                sessions.splice(index, 1);
                localStorage.setItem("sessions_mock_4", JSON.stringify(sessions));
                renderSavedSessions();
                updateTotalAccuracy();
            }
        }

        function updateSessionName(sessionIndex, newName) {
            if (newName && newName.trim() !== "") {
                sessions[sessionIndex].name = newName.trim();
                localStorage.setItem("sessions_mock_4", JSON.stringify(sessions));
                if (sessionIndex === currentLoadedSession) {
                    document.getElementById("stats-title").textContent = `Score Stats: ${newName.trim()}`;
                }
            }
        }

        function updateSession(sessionIndex) {
            const session = sessions[sessionIndex];

            // Confirmation dialog with session name
            if (confirm(`Confirm to update this into: ${session.name}`)) {
                // Update session with current data
                session.answers = [...answers];
                session.pageNumbers = [...pageNumbers];
                session.flagged = [...flagged];
                session.attempted = answers.filter(answer => answer !== null).length;
                session.rightCount = answers.filter(answer => answer === "right").length;
                session.percentage = session.attempted > 0 ? Math.round((session.rightCount / session.attempted) * 100) : 0;
                session.timeSpent = document.getElementById('timer').textContent;
                session.timestamp = new Date().toLocaleString();

                localStorage.setItem("sessions_mock_4", JSON.stringify(sessions));
                renderSavedSessions();
                updateTotalAccuracy();
                alert(`Session "${session.name}" updated successfully!`);
            }
        }
function renderSavedSessions() {
    const container = document.getElementById("saved-sessions-container");
    container.innerHTML = "";

    sessions.forEach((session, index) => {
        const sessionDiv = document.createElement("div");
        sessionDiv.classList.add("session-item");
        
        // Add 'loaded' class if this is the current loaded session
        if (index === currentLoadedSession) {
            sessionDiv.classList.add('loaded');
        }
        
        sessionDiv.innerHTML = `
            <input type="text" value="${session.name}" onblur="updateSessionName(${index}, this.value)" onkeypress="if(event.key==='Enter') this.blur()" style="background: transparent; border: none; font-size: 16px; font-weight: bold; color: inherit; width: 100%; padding: 2px; margin-bottom: 8px;">
            <div class="session-controls">
                <button class="load-btn" onclick="loadSession(${index})">Load</button>
                <button class="update-btn" onclick="updateSession(${index})">Update</button>
                <button class="delete-btn" onclick="deleteSession(${index})">Delete</button>
            </div>
        `;
        container.appendChild(sessionDiv);
    });
}
        function confirmReset() {
            if (confirm("Are you sure you want to reset the current session? This will clear all answers.")) {
                answers = [];
                pageNumbers = [];
                flagged = [];
                
                // Reset visual states
                document.querySelectorAll('.question-item').forEach(item => {
                    item.style.backgroundColor = '';
                });
                
                document.querySelectorAll('.flag-btn').forEach(btn => {
                    btn.style.backgroundColor = '#dc3545';
                });
                
                resetStats();
            }
        }

       function confirmResetQuiz() {
    if (confirm("Are you sure you want to start a new clean session? This will reset everything.")) {
        // Reset current loaded session
        currentLoadedSession = -1;
        
        document.getElementById("quiz-container").innerHTML = "";
        document.getElementById("question-sidebar").innerHTML = "";
        answers = [];
        pageNumbers = [];
        flagged = [];
        resetStats();
        
        // Update sessions display to remove loaded state
        renderSavedSessions();
    }
}

// Editable Header Functionality - Mock Exam 4
let originalHeaderText = 'CFA Mock Exam 4';
let isEditing = false;

// Load saved header text on page load
function loadSavedHeaderText() {
    const savedHeader = localStorage.getItem('cfa_header_mock_4');
    if (savedHeader) {
        originalHeaderText = savedHeader;
        document.getElementById('main-header').textContent = savedHeader;
        document.title = savedHeader;
    }
}

function makeEditable() {
    if (isEditing) return;

    isEditing = true;
    const headerElement = document.getElementById('main-header');
    const currentText = headerElement.textContent;

    headerElement.classList.add('editing');

    // Create input element
    const input = document.createElement('input');
    input.type = 'text';
    input.value = currentText;
    input.className = 'header-input';

    // Replace header content with input
    headerElement.innerHTML = '';
    headerElement.appendChild(input);

    // Focus and select all text
    input.focus();
    input.select();

    // Handle saving on Enter or blur
    function saveEdit() {
        const newText = input.value.trim();
        if (newText && newText !== '') {
            originalHeaderText = newText;
            headerElement.textContent = newText;
            // Save to localStorage with unique key
            localStorage.setItem('cfa_header_mock_3', newText);
            document.title = newText;
        } else {
            headerElement.textContent = originalHeaderText;
        }

        headerElement.classList.remove('editing');
        isEditing = false;
    }

    // Save on Enter key
    input.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            saveEdit();
        } else if (event.key === 'Escape') {
            headerElement.textContent = originalHeaderText;
            headerElement.classList.remove('editing');
            isEditing = false;
        }
    });

    // Save on blur (clicking outside)
    input.addEventListener('blur', saveEdit);
}

// Load saved header when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadSavedHeaderText();
});
