<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFA TRACKER DASHBOARD</title>
    <style>
        /* Global Styles */
        * {
            box-sizing: border-box;
            border-width: 0;
            border-style: solid;
            border-color: currentColor;
        }

        body {
            font-family: "Source Sans Pro", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, var(--color-grey-5) 0%, var(--color-grey-6) 100%);
            color: var(--color-grey-1);
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, var(--color-blue) 0%, var(--color-green-1) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: var(--3xl);
            font-weight: 700;
            margin: 20px 0 30px 0;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 20px rgba(0, 124, 175, 0.5);
            }
            to {
                text-shadow: 0 0 30px rgba(0, 166, 157, 0.8);
            }
        }

        h3 {
            color: var(--color-grey-1);
            position: relative;
            text-align: center;
        }

        h3::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, var(--color-blue), var(--color-green-1));
            border-radius: 1px;
        }

        .nav-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-container button {
            margin: 5px;
            padding: 12px 18px;
            font-size: var(--base);
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--color-blue) 0%, var(--color-green-1) 100%);
            color: var(--color-white);
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 124, 175, 0.3);
            position: relative;
            overflow: hidden;
        }

        .nav-container button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .nav-container button:hover::before {
            left: 100%;
        }

        .nav-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 124, 175, 0.5);
        }

        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .countdown-container {
            background: var(--color-grey-4);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            text-align: center;
            width: 220px;
            color: var(--color-grey-1);
            border: 1px solid var(--color-grey-3);
            position: relative;
            transition: all 0.3s ease;
        }

        .countdown-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-blue), var(--color-green-1));
            border-radius: 15px 15px 0 0;
        }

        .countdown-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5);
        }

        .countdown-container input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid var(--color-grey-3);
            background-color: var(--color-grey-5);
            color: var(--color-grey-1);
            transition: all 0.3s ease;
        }

        .countdown-container input:focus {
            outline: none;
            border-color: var(--color-blue);
            box-shadow: 0 0 0 2px rgba(0, 124, 175, 0.3);
        }

        .countdown-container button {
            background: linear-gradient(135deg, var(--color-green-1) 0%, var(--color-green-2) 100%);
            color: var(--color-white);
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 166, 157, 0.4);
        }

        .countdown-container button:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0, 166, 157, 0.5);
        }

        /* Enhanced Timer Display Styles */
        .countdown {
            margin-top: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timer-display {
            position: relative;
            width: 120px;
            height: 80px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-grey-5);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .timer-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background: conic-gradient(
                from 0deg,
                var(--color-blue) 0%,
                var(--color-green-1) var(--progress, 0%),
                var(--color-grey-3) var(--progress, 0%)
            );
            padding: 3px;
            transition: all 1s ease-in-out;
        }

        .timer-border::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            background: var(--color-grey-5);
            border-radius: 17px;
        }

        .timer-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .timer-number {
            font-size: var(--2xl);
            font-weight: 700;
            color: var(--color-blue);
            line-height: 1;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .timer-unit {
            font-size: var(--xs);
            color: var(--color-grey-2);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .timer-label {
            font-size: var(--sm);
            color: var(--color-grey-1);
            margin-top: 8px;
            font-weight: 500;
            text-align: center;
            line-height: 1.2;
        }

        .timer-status {
            font-size: var(--xs);
            color: var(--color-green-1);
            margin-top: 2px;
            font-weight: 600;
        }

        /* CSS Variables */
        :root {
            --color-white: #fff;
            --color-black: #000;
            --color-grey-manual: #8b999e;
            --color-grey-6: #1B212B;
            --color-grey-5: #222938;
            --color-grey-4: #272F3D;
            --color-grey-3: #3D4754;
            --color-grey-2: #727A88;
            --color-grey-1: #C0C9CD;
            --color-green-1: #00A69D;
            --color-green-2: #015954;
            --color-yellow: #EFCE5A;
            --color-blue: #007CAF;
            --color-red: #B44545;
            --color-correct: #00B96F;
            --color-wrong: #D42F4A;
            --color-offwhite: #EDF2F2;
            --color-orange: #E5845F;
            --font-sans: "Source Sans Pro", "Arial", "sans-serif";
            --font-mono: "Menlo", "Monaco", "Consolas", '"Liberation Mono"', '"Courier New"', "monospace";
            --xxs: .6875rem;
            --xs: .8125rem;
            --sm: .875rem;
            --base: 1rem;
            --lg: 1.125rem;
            --xl: 1.3125rem;
            --2xl: 1.625rem;
            --3xl: 2rem;
            --4xl: 2.5rem;
            --5xl: 3.44rem;
        }

        .notes-container {
            position: relative;
            width: 80%;
            max-width: 800px;
            margin: 20px auto 20px;
            text-align: center;
            background: var(--color-grey-4);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            color: var(--color-grey-1);
            border: 1px solid var(--color-grey-3);
            transition: all 0.3s ease;
        }

        .notes-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--color-blue), var(--color-green-1));
            border-radius: 15px 15px 0 0;
        }

        .notes-container:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5);
        }

        .notes-container h3 {
            margin-top: 0;
            color: var(--color-blue);
        }

        .notes-container textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid var(--color-grey-3);
            background-color: var(--color-grey-5);
            color: var(--color-grey-1);
            font-family: var(--font-sans);
            font-size: var(--base);
            resize: vertical;
            min-height: 60px;
            transition: all 0.3s ease;
        }

        .notes-container textarea:focus {
            outline: none;
            border-color: var(--color-blue);
            box-shadow: 0 0 0 2px rgba(0, 124, 175, 0.2);
        }

        .notes-container button {
            background: linear-gradient(135deg, var(--color-green-1) 0%, var(--color-green-2) 100%);
            color: var(--color-white);
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: var(--sm);
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 166, 157, 0.3);
        }

        .notes-container button:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0, 166, 157, 0.4);
        }

        .notes-container button:last-child {
            background: linear-gradient(135deg, var(--color-grey-3) 0%, var(--color-grey-2) 100%);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .notes-container button:last-child:hover {
            background: linear-gradient(135deg, var(--color-grey-2) 0%, var(--color-grey-1) 100%);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .countdown-wrapper {
                flex-direction: column;
                align-items: center;
            }

            .notes-container {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <h1 contenteditable="true">CFA TRACKER DASHBOARD</h1>
    <div class="nav-container">
        <h3>Topics</h3>
        <button onclick="openTopic('cfa_ethics.html')">Ethical and Professional Standards</button>
        <button onclick="openTopic('cfa_quantitative_methods.html')">Quantitative Methods</button>
        <button onclick="openTopic('cfa_economics.html')">Economics</button>
        <button onclick="openTopic('cfa_financial_reporting.html')">Financial Statement Analysis</button>
        <button onclick="openTopic('cfa_corporate_finance.html')">Corporate Issuers</button>
        <button onclick="openTopic('cfa_equity_investments.html')">Equity Investments</button>
        <button onclick="openTopic('cfa_fixed_income.html')">Fixed Income</button>
        <button onclick="openTopic('cfa_derivatives.html')">Derivatives</button>
        <button onclick="openTopic('cfa_alternative_investments.html')">Alternative Investments</button>
        <button onclick="openTopic('cfa_portfolio_management.html')">Portfolio Management</button>
        <h3>Mock Exams</h3>
        <button onclick="openTopic('mock_1.html')">Mock 1</button>
        <button onclick="openTopic('mock_2.html')">Mock 2</button>
        <button onclick="openTopic('mock_3.html')">Mock 3</button>
        <button onclick="openTopic('mock_4.html')">Mock 4</button>
        <button onclick="openTopic('mock_5.html')">Mock 5</button>
        <button onclick="openTopic('mock_6.html')">Mock 6</button>
        <button onclick="openTopic('mock_7.html')">Mock 7</button>
        <button onclick="openTopic('mock_8.html')">Mock 8</button>
        <button onclick="openTopic('mock_9.html')">Mock 9</button>
        <button onclick="openTopic('mock_10.html')">Mock 10</button>
    </div>
    <div class="countdown-wrapper">
        <div class="countdown-container">
            <input type="text" class="timer-name" placeholder="Timer 1 Name" id="timer-name1">
            <input type="datetime-local" id="countdown-time1">
            <button onclick="startCountdown('countdown-time1', 'countdown1', 'timer-name1')">Start</button>
            <div class="countdown" id="countdown1">
                <div class="timer-display">
                    <div class="timer-border" id="timer-border1" style="--progress: 0%"></div>
                    <div class="timer-content">
                        <div class="timer-number" id="timer-number1">0</div>
                        <div class="timer-unit">DAYS</div>
                    </div>
                </div>
                <div class="timer-label" id="timer-label1">Ready</div>
                <div class="timer-status" id="timer-status1"></div>
            </div>
        </div>

        <div class="countdown-container">
            <input type="text" class="timer-name" placeholder="Timer 2 Name" id="timer-name2">
            <input type="datetime-local" id="countdown-time2">
            <button onclick="startCountdown('countdown-time2', 'countdown2', 'timer-name2')">Start</button>
            <div class="countdown" id="countdown2">
                <div class="timer-display">
                    <div class="timer-border" id="timer-border2" style="--progress: 0%"></div>
                    <div class="timer-content">
                        <div class="timer-number" id="timer-number2">0</div>
                        <div class="timer-unit">DAYS</div>
                    </div>
                </div>
                <div class="timer-label" id="timer-label2">Ready</div>
                <div class="timer-status" id="timer-status2"></div>
            </div>
        </div>
    </div>
    <div class="notes-container">
        <h3>Daily Notes & Motivation</h3>
        <textarea 
            id="daily-notes" 
            placeholder="Write your daily notes, goals, or motivational quotes here..." 
            rows="4"
        ></textarea>
        <button onclick="saveNotes()">Save Notes</button>
        <button onclick="clearNotes()">Clear Notes</button>
    </div>
    <script>
// Notes functionality
function saveNotes() {
    const notesText = document.getElementById('daily-notes').value;
    localStorage.setItem('dailyNotes', notesText);
    alert('Notes saved successfully!');
}

function clearNotes() {
    if (confirm('Are you sure you want to clear your notes?')) {
        document.getElementById('daily-notes').value = '';
        localStorage.removeItem('dailyNotes');
    }
}

function loadNotes() {
    const savedNotes = localStorage.getItem('dailyNotes');
    if (savedNotes) {
        document.getElementById('daily-notes').value = savedNotes;
    }
}

// Function to open a specific topic page
function openTopic(page) {
    window.location.href = page;
}

// Enhanced Countdown function with curved rectangle progress
function startCountdown(inputId, displayId, nameId) {
    const inputTime = document.getElementById(inputId).value;
    const timerName = document.getElementById(nameId).value || "Countdown";
    const targetTime = new Date(inputTime).getTime();

    if (!inputTime) {
        alert("Please select a valid date.");
        return;
    }

    // Calculate initial total days for progress calculation
    const now = new Date().getTime();
    const totalTime = targetTime - now;
    const totalDays = Math.ceil(totalTime / (1000 * 60 * 60 * 24));

    // Save the countdown data to localStorage
    localStorage.setItem(displayId, JSON.stringify({
        targetTime: targetTime,
        timerName: timerName,
        totalDays: totalDays
    }));

    updateCountdown(displayId);
}

function updateCountdown(displayId) {
    const savedData = JSON.parse(localStorage.getItem(displayId));

    if (!savedData) return;

    const targetTime = savedData.targetTime;
    const timerName = savedData.timerName;
    const totalDays = savedData.totalDays;

    // Get timer elements
    const timerNumber = displayId.replace('countdown', '');
    const timerNumberElement = document.getElementById('timer-number' + timerNumber);
    const timerLabelElement = document.getElementById('timer-label' + timerNumber);
    const timerStatusElement = document.getElementById('timer-status' + timerNumber);
    const timerBorderElement = document.getElementById('timer-border' + timerNumber);

    const interval = setInterval(() => {
        const now = new Date().getTime();
        const timeLeft = targetTime - now;

        if (timeLeft <= 0) {
            clearInterval(interval);
            timerNumberElement.innerHTML = "0";
            timerLabelElement.innerHTML = timerName;
            timerStatusElement.innerHTML = "Complete!";
            timerBorderElement.style.setProperty('--progress', '100%');
            localStorage.removeItem(displayId);
            return;
        }

        const days = Math.ceil(timeLeft / (1000 * 60 * 60 * 24));

        // Update display elements
        timerNumberElement.innerHTML = days;
        timerLabelElement.innerHTML = timerName;
        timerStatusElement.innerHTML = `Days remaining for: ${timerName}`;

        // Update curved border progress
        const progress = totalDays > 0 ? ((totalDays - days) / totalDays) * 100 : 0;
        timerBorderElement.style.setProperty('--progress', progress + '%');

    }, 1000);
}

window.onload = function () {
    // Load saved notes
    loadNotes();

    // Load countdown timers
    const countdownIds = ["countdown1", "countdown2"];
    countdownIds.forEach(id => {
        const savedData = JSON.parse(localStorage.getItem(id));
        if (savedData) {
            // Set the input values from localStorage
            const inputTimeElement = document.getElementById(id.replace('countdown', 'countdown-time'));
            const timerNameElement = document.getElementById(id.replace('countdown', 'timer-name'));
            inputTimeElement.value = new Date(savedData.targetTime).toISOString().slice(0, 16);
            timerNameElement.value = savedData.timerName;

            updateCountdown(id);
        }
    });
};

    </script>
</body>
</html>
